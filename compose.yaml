services:
  frontend:
    container_name: hsp-fe

  backend:
    container_name: hsp-be

  db:
    image: postgres:16
    container_name: hsp-db
    restart: always
    shm_size: 128mb
    volumes:
      - ./postgres-data/data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_DATABASE}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB_DATABASE}"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy
    container_name: hsp-caddy
    restart: always
    ports:
      - "${PORT}:80"
    volumes:
      - ./config-prod/Caddyfile:/etc/caddy/Caddyfile